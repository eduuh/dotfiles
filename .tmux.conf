#============================================================================
# TMUX CONFIGURATION
#============================================================================

#----------------------------------------------------------------------------
# Core Settings
#----------------------------------------------------------------------------

# Terminal & colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
set -gq allow-passthrough off

# Shell
if-shell '[ -x /bin/zsh ]' 'set-option -g default-shell /bin/zsh'

# History
set -g history-limit 100000

# Timing
set -s escape-time 0
set -g display-panes-time 2000

# Extended keys — distinguish C-BSpace, C-Enter, etc. from their base keys
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys,*-kitty:extkeys,*-ghostty:extkeys'

# Mouse
set -g mouse on

# Window/pane numbering (start at 1)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Disable visual noise
set -g visual-activity off
set -g visual-bell off

#----------------------------------------------------------------------------
# Prefix & Core Bindings
#----------------------------------------------------------------------------

# Prefix: C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind R source-file ~/.tmux.conf \; display "Config reloaded!"

# Clean up bindings that were removed (so reload re-applies cleanly)
unbind S
unbind J
unbind c
unbind C
unbind C-n
unbind C-s
unbind W
unbind N
unbind y
unbind k
unbind a
unbind `
unbind i
unbind C-r
unbind C-w
set-hook -gu after-new-window
set-hook -gu window-renamed

#----------------------------------------------------------------------------
# Pane Management
#----------------------------------------------------------------------------

# Splits (v=right, s=below) - keeps current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Pane navigation (arrow keys)
bind -r Left select-pane -L
bind -r Down select-pane -D
bind -r Up select-pane -U
bind -r Right select-pane -R

# Pane resizing (shift + arrow)
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# Kill pane (with confirm)
bind q confirm-before -p "Kill pane? (y/n)" kill-pane

# Toggle zoom
bind z resize-pane -Z

#----------------------------------------------------------------------------
# Window Management
#----------------------------------------------------------------------------

# New window (keeps path)
bind w new-window -c "#{pane_current_path}"

# Rename window
bind r command-prompt -p "Rename:" "rename-window '%%'"

# Direct window access
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# Previous/next window
bind -r [ previous-window
bind -r ] next-window

# Cycle to next window (no prefix)
bind -n C-BSpace next-window

# Move windows left/right
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

#----------------------------------------------------------------------------
# Session Management
#----------------------------------------------------------------------------

# Project picker (tat with preview)
bind C-o display-popup -E -w 80% -h 80% "$HOME/.bin/tmux/tat"

# Kill session and switch to next
bind t run-shell '(tmux switch-client -l || tmux switch-client -n) && tmux kill-session -t "#S" || tmux kill-session'

# Rename current session
bind . command-prompt -p "Rename session:" "rename-session '%%'"

#----------------------------------------------------------------------------
# Worktree Workflow (windows = worktrees)
#----------------------------------------------------------------------------

# Open worktree as window, or create it from latest main if the typed name is new
bind o display-popup -E -w 60% -h 50% "$HOME/.bin/tmux/tmux-wt.sh"

# Always open a new window on a chosen worktree (never re-selects existing)
bind W display-popup -E -w 60% -h 50% "$HOME/.bin/tmux/tmux-wt.sh --new"

# Remove current window's worktree and kill the window
bind X display-popup -E -w 60% -h 40% "$HOME/.bin/tmux/tmux-wt-kill.sh"

# Pick any worktree to kill its window + delete the worktree
bind D display-popup -E -w 60% -h 50% "$HOME/.bin/tmux/tmux-wt-kill.sh --pick"

# Branch note popup
bind n display-popup -E -w 97% -h 97% -d "#{pane_current_path}" "$HOME/.bin/tmux/tmux-note.sh"

#----------------------------------------------------------------------------
# Copy Mode (vi-style)
#----------------------------------------------------------------------------

setw -g mode-keys vi

# Enter copy mode
bind Space copy-mode

# Selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Navigation
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi g send -X history-top
bind -T copy-mode-vi G send -X history-bottom

# Search
bind -T copy-mode-vi / command-prompt -p "/" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "?" "send -X search-backward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# System clipboard (platform-specific)
if-shell 'uname | grep -qi darwin' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Paste
bind p paste-buffer
bind P choose-buffer

#----------------------------------------------------------------------------
# Status Line
#----------------------------------------------------------------------------

set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=white"

# Left: empty
set -g status-left ""

# Right: empty
set -g status-right ""

# Top bar: session + branch + todos
set -g status 2
set -g status-format[1] "#[align=right,bg=default]#[fg=colour243]#S #[fg=colour238]│ #[fg=cyan,bold]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)#[fg=colour243,nobold]#($HOME/.bin/tmux/branch-note-status.sh '#{pane_current_path}') "

# Window format
setw -g window-status-format "#[fg=colour243] #I #W "
setw -g window-status-current-format "#[fg=white,bold] #I #W "
setw -g window-status-separator "#[fg=colour238]│"

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=cyan"

# Messages
set -g message-style "bg=default,fg=yellow"

#----------------------------------------------------------------------------
# Popups & Tools
#----------------------------------------------------------------------------

# Editor popup (nvim) — close with :qa inside nvim
bind e display-popup -E -w 97% -h 97% -d "#{pane_current_path}" "$HOME/.bin/tmux/tmux-edit.sh"

# Lazygit
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

#----------------------------------------------------------------------------
# Plugins
#----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Continuum settings
set -g @continuum-restore 'off'
set -g @continuum-save-interval '0'

# Initialize TPM (keep at bottom)
run-shell '~/.tmux/plugins/tpm/tpm'
