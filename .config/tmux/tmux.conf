###################################################################
# KEY BINDINGS - CLEANUP
###################################################################
unbind-key -n Tab

unbind-key M-Up

unbind-key M-Down

unbind-key M-Left

unbind-key M-Right

unbind-key C-Up

unbind-key C-Down

unbind-key C-Left

unbind-key C-Right

unbind-key C-b

unbind-key C-z

unbind-key !

unbind-key '"'

unbind-key '#'

unbind-key '$'

unbind-key %

unbind-key &

unbind-key "'"

unbind-key (

unbind-key )

unbind-key -

unbind-key .

unbind-key :

unbind-key =

unbind-key D

unbind-key L

unbind-key [

unbind-key ]

unbind-key f

unbind-key l

unbind-key n

unbind-key t

unbind-key x

unbind-key PPage

unbind-key M-n

unbind-key M-o

unbind-key M-p

###################################################################
# Key bindings SESSIONS [lowercase]
# #################################################################
bind ( switch-client -p
bind ) switch-client -n

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'laktak/extrakto'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
