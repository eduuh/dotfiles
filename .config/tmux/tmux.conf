
# Tmux configuration by Edwin Muraya
# A vim-like Tmux experience! I use colemak keyboard layout with the keys HNEI arrows instead of HJKL, K
# instead of N for searching, etc. Places where my own Colemak-Vim bindings are used mention
# Use Ctrl ; panes [windows] use shift ; sessions use lowercase
set -g default-terminal 'tmux-256color' # replace this with your custom term-info name
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q' # this is for the cursor shape
## general option of Tmux
# setting the prefix to ctrl+n
set -g history-limit 500000
# Setting a small delay between prefix and command
set -g escape-time 0
set -g display-time 4000

# Sane Scrolling
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
#
set -g base-index 1
set-window-option -g pane-base-index 1
# Setting the base of panes to 1 instead of 0
setw -g pane-base-index 1
set -g mouse on
unbind C-b
set -g prefix C-Space

# vi mode
#set -g status-keys vi
set-window-option -g mode-keys vi

#set -g mode-keys vi

set-option -g status-left-style default
set-option -g status-justify right
set-option -g status-bg black # colour213 # pink
set-option -g status-left '#[fg=magenta]» #[fg=blue,bold]#W#[default]'
set-option -g status-right '#[fg=red,bold][[#(git branch) ]] #[fg=cyan]»» #[fg=blue,bold]###S #[fg=magenta]%R %m-%d#(acpi | cut -d ',' -f 2)#[default]'
set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T'
# Misc
bind-key p paste-buffer

# Reload the file with Prefix r
bind r source-file ~/.config/tmux/tmux.conf	\; refresh-client \; display "Conf Reloaded!"

# Splitting windows
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

bind-key o command-prompt -p 'New sessions Name:' 'new -s "%%"'
bind-key < command-prompt -p 'Rename sessions :' 'rename-session "%%"'
bind-key Enter choose-session

##################################################################
# KEY BINDING: WINDOWS [ctrl]
##################################################################

unbind n  #DEFAULT KEY: Move to next window
unbind w  #DEFAULT KEY: change current window interactively

bind n command-prompt "rename-window '%%'"
bind w new-window -c "#{pane_current_path}"
bind-key , command-prompt -p 'Rename Window:' 'rename-window "%%"'
#################################################################
# KEY BINDINGS - PANES [uppercase]

# last/select pane. [colemak]
# bind-key ### last-pane
bind-key -n c-h select-pane -L
bind-key -n c-n select-pane -D
bind-key -n c-e select-pane -U
bind-key -n c-i select-pane -R

# last/previous/next window
bind-key -n M-n previous-window
bind-key -n M-e next-window

# More vim-like quit
bind-key q confirm-before -p "Quit pane @P? (y/n)" kill-pane

# Resize panes with arrows
bind-key -r  Left resize-pane -L 5
bind-key -r  Down resize-pane -D 5
bind-key -r  Up resize-pane -R 5


#################################################################

# KEY BINDINGS -VI COPY MODE
# More vim-like# More vim-like
bind-key Space copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi c-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# colemak keys
# hnei
bind-key -T copy-mode-vi n send -X cursor-down
bind-key -T copy-mode-vi e send -X cursor-up
bind-key -T copy-mode-vi i send -X cursor-right
bind-key -T copy-mode-vi k send -X search-again
bind-key -T copy-mode-vi K send -X search-reverse
bind-key -T copy-mode-vi l send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line
bind-key -T copy-mode-vi j send -X next-word-end
bind-key -T copy-mode-vi J send -X next-space-end
bind-key -T copy-mode-vi c-n send -X bottom-line
bind-key -T copy-mode-vi c-m send -X middle-line
bind-key -T copy-mode-vi c-e send -X top-line


